# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. Install dependencies for root/frontend and build
      - run: npm ci && npm run build
      
      # 2. Install dependencies for your Cloud Functions backend
      - run: npm ci
        working-directory: functions

      # 3. Deploy both Hosting and Cloud Functions using Firebase CLI action
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRIPLE_CROWN_STORE }}
          channelId: live
          projectId: triple-crown-store
          target: hosting
          
      # Alternatively, deploy everything defined in firebase.json using Firebase CLI directly:
      - uses: w9jds/firebase-action@v13.3.0
        with:
          args: deploy --only hosting,functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRIPLE_CROWN_STORE }}